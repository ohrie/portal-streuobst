events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|avif)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Next.js static export - handle trailing slashes
        location / {
            # Try file with .html, then directory, then add trailing slash and redirect
            try_files $uri $uri.html $uri/ @add_trailing_slash;
        }

        # Add trailing slash for directory routes
        location @add_trailing_slash {
            rewrite ^([^.]*[^/])$ $1/ permanent;
        }

        # Custom error pages
        error_page 404 /404.html;
        location = /404.html {
            internal;
        }
    }
}
